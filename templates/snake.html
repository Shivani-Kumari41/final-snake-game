<!DOCTYPE html>
<html>
<body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#333;">
    <canvas id="game" width="400" height="400" style="background:black; border:2px solid white;"></canvas>
    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1, dy = 0;

        function update() {
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
            } else { snake.pop(); }
            
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = "red"; // Food
            ctx.fillRect(food.x*20, food.y*20, 18, 18);
            ctx.fillStyle = "lime"; // Snake
            snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18));
        }
        document.addEventListener("keydown", (e) => {
            if(e.key === "ArrowUp") {dx=0; dy=-1;}
            if(e.key === "ArrowDown") {dx=0; dy=1;}
            if(e.key === "ArrowLeft") {dx=-1; dy=0;}
            if(e.key === "ArrowRight") {dx=1; dy=0;}
        });
        setInterval(update, 200);
    </script>
</body>
</html>
