<!DOCTYPE html>
<html>
<head>
    <style>
        body { text-align: center; background: #1a1a1a; color: #fff; font-family: 'Segoe UI', sans-serif; }
        h2 { color: #f1c40f; margin-bottom: 5px; }
        #message { height: 30px; font-size: 20px; font-weight: bold; color: #f1c40f; margin-bottom: 10px; }
        canvas { background: #000; border: 8px solid #444; border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        button { padding: 20px 35px; font-size: 22px; margin: 8px; border-radius: 12px; border: none; background: #2ecc71; color: white; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #27ae60; }
    </style>
</head>
<body>
    <h2>Snake Game</h2>
    <div id="message"></div>
    <canvas id="game" width="400" height="400"></canvas>
    
    <div id="controls">
        <button onclick="changeDir(0,-1)">UP</button><br>
        <button onclick="changeDir(-1,0)">LEFT</button>
        <button onclick="changeDir(1,0)">RIGHT</button><br>
        <button onclick="changeDir(0,1)">DOWN</button>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const msg = document.getElementById("message");
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1, dy = 0;

        function changeDir(x, y) { dx = x; dy = y; }

        function update() {
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
                alert("Game Over!");
                snake = [{x: 10, y: 10}]; dx = 1; dy = 0; return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
                msg.innerText = "Good!";
                setTimeout(() => msg.innerText = "", 800);
            } else { snake.pop(); }
            
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = "#f1c40f"; // Yellow Food
            ctx.fillRect(food.x*20, food.y*20, 18, 18);
            ctx.fillStyle = "#2ecc71"; // Snake
            snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18));
        }
        setInterval(update, 200);
    </script>
</body>
</html>
