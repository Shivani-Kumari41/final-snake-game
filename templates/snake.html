<script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const msg = document.getElementById("message");
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1, dy = 0;
        let speed = 250;

        function changeDir(x, y) { dx = x; dy = y; }

        function gameLoop() {
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Border Check OR Self-Collision Check
            let selfCollision = snake.some(segment => segment.x === head.x && segment.y === head.y);
            
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || selfCollision) {
                alert("Game Over!");
                snake = [{x: 10, y: 10}]; dx = 1; dy = 0; speed = 250;
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
                msg.innerText = "Good!";
                setTimeout(() => msg.innerText = "", 800);
                if (speed > 100) speed -= 15;
            } else { snake.pop(); }
            
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = "#f1c40f"; 
            ctx.fillRect(food.x*20, food.y*20, 18, 18);
            ctx.fillStyle = "#2ecc71";
            snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18));

            setTimeout(gameLoop, speed);
        }
        gameLoop();
    </script>
